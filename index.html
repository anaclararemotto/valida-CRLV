<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de CRLV</title>
    <link rel="shortcut icon" href="caminhao.jpg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrap">
  <div class="header">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="3" width="14" height="10" rx="2" stroke="#a8dfb8" stroke-width="1.2"/><path d="M5 13v2M13 13v2M2 8h14" stroke="#a8dfb8" stroke-width="1.2" stroke-linecap="round"/><circle cx="5" cy="10.5" r="1" fill="#a8dfb8"/><circle cx="13" cy="10.5" r="1" fill="#a8dfb8"/></svg>
    </div>
    <h2>Validade da CRLV</h2>
  </div>
  <p class="sub">Verifique o vencimento do licenciamento do seu veículo.</p>

  <div class="card">
    <div class="grid2">
      <div class="field">
        <label>Último dígito da placa</label>
        <input type="number" id="digito" min="0" max="9" placeholder="0 – 9" maxlength="1" oninput="if(this.value.length>1)this.value=this.value.slice(0,1)">
      </div>
      <div class="field">
        <label>Estado (UF)</label>
        <select id="estado">
          <option value="">Selecione...</option>
          <option value="AC">AC – Acre</option>
          <option value="AL">AL – Alagoas</option>
          <option value="AP">AP – Amapá</option>
          <option value="AM">AM – Amazonas</option>
          <option value="BA">BA – Bahia</option>
          <option value="CE">CE – Ceará</option>
          <option value="DF">DF – Distrito Federal</option>
          <option value="ES">ES – Espírito Santo</option>
          <option value="GO">GO – Goiás</option>
          <option value="MA">MA – Maranhão</option>
          <option value="MT">MT – Mato Grosso</option>
          <option value="MS">MS – Mato Grosso do Sul</option>
          <option value="MG">MG – Minas Gerais</option>
          <option value="PA">PA – Pará</option>
          <option value="PB">PB – Paraíba</option>
          <option value="PR">PR – Paraná</option>
          <option value="PE">PE – Pernambuco</option>
          <option value="PI">PI – Piauí</option>
          <option value="RJ">RJ – Rio de Janeiro</option>
          <option value="RN">RN – Rio Grande do Norte</option>
          <option value="RS">RS – Rio Grande do Sul</option>
          <option value="RO">RO – Rondônia</option>
          <option value="RR">RR – Roraima</option>
          <option value="SC">SC – Santa Catarina</option>
          <option value="SP">SP – São Paulo</option>
          <option value="SE">SE – Sergipe</option>
          <option value="TO">TO – Tocantins</option>
        </select>
      </div>
    </div>
    <div class="grid2"><div class="field">
      <label>Data de emissão da CRLV atual</label>
      <input type="date" id="emissao">
    </div>
    <div class="field">
  <label>Exercício da CRLV</label>
  <input 
    type="number" 
    id="exercicio" 
    placeholder="Ex: 2025"
    min="2000"
    max="2100"
  >
</div></div>
    <div class="divider"></div>
    <button onclick="calcular()">Verificar validade</button>
  </div>

  <div id="result-area"></div>
</div>

<script src="js.js"></script>
</body>
</html>
